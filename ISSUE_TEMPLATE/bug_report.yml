name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type: bug", "status: needs-triage"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - Critical (production down)
        - P1 - High (major feature broken)
        - P2 - Medium (feature partially broken)
        - P3 - Low (minor issue)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Node version, Browser, etc."
